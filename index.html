<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2f6b3e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="オセロ">
  <meta name="format-detection" content="telephone=no, email=no, address=no">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <title>オセロ</title>
</head>
<body>
  <div class="app-shell">
    <main class="app" id="app">
      <section class="screen screen--menu is-active" id="menuScreen" aria-label="対戦モード選択">
        <div class="hero">
          <p class="eyebrow">スマホ最優先のオセロ</p>
          <h1>オセロ</h1>
          <p class="lead">二人対戦か、CPU対戦を選んでください。</p>
        </div>

        <div class="panel mode-panel">
          <button class="big-button big-button--primary" id="twoPlayerButton">二人対戦</button>

          <div class="menu-section">
            <p class="menu-heading">CPU対戦の手番</p>
            <div class="segmented-control" role="group" aria-label="CPU対戦の手番">
              <button class="segmented-control__button is-selected" type="button" data-side="black">先手（黒）</button>
              <button class="segmented-control__button" type="button" data-side="white">後手（白）</button>
            </div>
          </div>

          <div class="menu-section">
            <p class="menu-heading">CPU難易度</p>
            <div class="difficulty-grid" role="group" aria-label="CPU難易度">
              <button class="choice-button is-selected" type="button" data-level="easy">かんたん</button>
              <button class="choice-button" type="button" data-level="normal">ふつう</button>
              <button class="choice-button" type="button" data-level="strong">つよい</button>
              <button class="choice-button" type="button" data-level="expert">エキスパート</button>
              <button class="choice-button" type="button" data-level="master">マスター</button>
            </div>
          </div>

          <div class="menu-section">
            <p class="menu-heading">デバッグ</p>
            <button class="small-button" id="debugToggleButton" type="button" aria-pressed="false">デバッグモード: OFF</button>
          </div>

          <button class="big-button big-button--primary" id="cpuStartButton">CPU対戦をはじめる</button>
        </div>
      </section>

      <section class="screen" id="gameScreen" aria-label="ゲーム画面" hidden>
        <header class="topbar panel">
          <div class="scoreboard">
            <div class="score-card score-card--black">
              <span class="score-label">黒</span>
              <strong id="blackCount">2</strong>
            </div>
            <div class="score-card score-card--white">
              <span class="score-label">白</span>
              <strong id="whiteCount">2</strong>
            </div>
          </div>

          <div class="status-row">
            <div class="status-pill" id="turnLabel">黒の手番</div>
            <div class="status-pill status-pill--accent" id="thinkingLabel" hidden>考え中…</div>
          </div>

          <div class="control-row">
            <button class="small-button" id="resetButton">リセット</button>
            <button class="small-button" id="rematchButton">もう一度遊ぶ</button>
            <button class="small-button" id="backToMenuButton">モード選択</button>
          </div>
        </header>

        <section class="board-shell panel">
          <div class="board" id="board" aria-label="8x8オセロ盤"></div>
        </section>

        <section class="message panel" aria-live="polite">
          <p id="messageText">黒からスタートします。</p>
        </section>

        <section class="debug-panel panel" id="debugPanel" hidden aria-label="デバッグ情報">
          <h2>デバッグ情報</h2>
          <pre id="debugInfo">未計測</pre>
        </section>
      </section>
    </main>
  </div>

  <div class="celebration-layer" id="celebrationLayer" aria-hidden="true"></div>

  <script src="ai/weights.js"></script>
  <script src="ai/transposition.js"></script>
  <script src="ai/openingBook.js"></script>
  <script src="ai/evaluation.js"></script>
  <script src="ai/minimax.js"></script>
  <script src="ai/search.js"></script>
  <script src="ai.js"></script>
  <script src="script.js"></script>
</body>
</html>
